services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: preventec_frontend
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env.local
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npx prisma generate && npm run dev -- --hostname 0.0.0.0 --port 3003"

  postgres:
    image: postgres:17
    container_name: preventec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: preventec_blog
      POSTGRES_USER: preventec_user
      POSTGRES_PASSWORD: preventec_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
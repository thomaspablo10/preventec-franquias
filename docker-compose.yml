services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: preventec_frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - .env.local
    depends_on:
      - postgres
    command: sh -c "npm install && npx prisma generate && npm run build && npm run start"

  postgres:
    image: postgres:17
    container_name: preventec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: preventec_blog
      POSTGRES_USER: preventec_user
      POSTGRES_PASSWORD: preventec_pass
    ports:
      - "5003:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: